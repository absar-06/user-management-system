<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Enter Email">

<br><br>

<input
type="password"
id="password"
placeholder="Enter Password">

<br><br>

<div
id="message"
style="
display:none;
margin-bottom:15px;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
background:white;
">
</div>

<button onclick="login()">

Login

</button>

</div>

<script>

async function login(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

const response =
await fetch(

"http://localhost:5000/api/users/login",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

email,
password

})

}

);

const data =
await response.json();

if(response.ok){

document
.getElementById(
"message"
)
.style.display=
"block";

document
.getElementById(
"message"
)
.style.color=
"#00ff7f";

document
.getElementById(
"message"
)
.innerHTML=
"✔ Login Successful";

setTimeout(()=>{

window.location=
"dashboard.html";

},1500);

}

else{

document
.getElementById(
"message"
)
.style.display=
"block";

document
.getElementById(
"message"
)
.style.color=
"red";

document
.getElementById(
"message"
)
.innerHTML=
data.message;

}

}

</script>

</body>

</html>
